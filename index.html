<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>2026 무궁화 품종 전시회 개최 | 안동무궁화연구소</title>
 
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
    background-color: #f5f5f5;
    color: #222;
    padding: 16px;
  }

  header {
    text-align: center;
    padding: 20px 0 24px;
  }

  header h1 {
    font-size: 22px;
    font-weight: 700;
  }

  .gallery {
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 700px;
    margin: 0 auto;
  }

  .photo-card {
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #e0e0e0;
  }

  .photo-card img {
    width: 100%;
    height: auto;
    display: block;
    cursor: zoom-in;
  }

  .photo-card .caption {
    padding: 10px 14px;
    font-size: 14px;
    color: #555;
    border-top: 1px solid #eee;
  }

  /* 확대 보기(라이트박스) */
  .lightbox {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.9);
    z-index: 999;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .lightbox.active {
    display: flex;
  }

  .lightbox img {
    max-width: 100%;
    max-height: 100%;
    border-radius: 8px;
  }

  footer {
    text-align: center;
    padding: 24px 0;
    font-size: 12px;
    color: #999;
  }
</style>
</head>
<body>

  <header>
  </header>

  <main class="gallery">
    <div class="photo-card">
      <img src="001.jpg" alt="사진 1" loading="lazy" onclick="openLightbox(this.src)">
    </div>

    <div class="photo-card">
      <img src="002.jpg" alt="사진 2" loading="lazy" onclick="openLightbox(this.src)">
    </div>

    <div class="photo-card">
      <img src="003.jpg" alt="사진 3" loading="lazy" onclick="openLightbox(this.src)">
    </div>
  </main>

  <footer>
    tap on image to zoom
  </footer>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="확대 이미지">
  </div>

  <script>
    function openLightbox(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('active');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }
  </script>

</body>
</html>
