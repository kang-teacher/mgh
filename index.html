<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>2026 무궁화 품종 전시회 개최 | 안동무궁화연구소</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
    background-color: #f5f5f5;
    color: #222;
    padding: 16px;
  }

  header {
    text-align: center;
    padding: 20px 0 24px;
  }

  header h1 {
    font-size: 22px;
    font-weight: 700;
  }

  .gallery {
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 700px;
    margin: 0 auto;
  }

  .photo-card {
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #e0e0e0;
  }

  .photo-card img {
    width: 100%;
    height: auto;
    display: block;
    cursor: zoom-in;
  }

  .photo-card .caption {
    padding: 10px 14px;
    font-size: 14px;
    color: #555;
    border-top: 1px solid #eee;
  }

  /* 확대 보기(라이트박스) */
  .lightbox {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.9);
    z-index: 999;
    align-items: center;
    justify-content: center;
    padding: 16px;
    overflow: hidden;
    touch-action: none; /* 브라우저 기본 제스처 방지 → 우리가 만든 핀치줌만 동작 */
  }

  .lightbox.active {
    display: flex;
  }

  .lightbox img {
    max-width: 100%;
    max-height: 100%;
    border-radius: 8px;
    touch-action: none;
    will-change: transform;
    transform-origin: center center;
  }

  .lightbox-close {
    position: absolute;
    top: 14px;
    right: 18px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    color: #fff;
    font-size: 22px;
    line-height: 40px;
    text-align: center;
    z-index: 1000;
  }

  /* 카카오톡 공유 버튼 */
  .share-section {
    max-width: 700px;
    margin: 28px auto 0;
    text-align: center;
  }

  .kakao-share-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background-color: #FEE500;
    color: #222;
    border: none;
    border-radius: 10px;
    padding: 12px 22px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }

  .kakao-share-btn:active {
    transform: scale(0.98);
  }

  .kakao-share-btn svg {
    width: 20px;
    height: 20px;
  }

  footer {
    text-align: center;
    padding: 24px 0;
    font-size: 12px;
    color: #999;
  }
</style>
</head>
<body>

  <header>
  </header>

  <main class="gallery">
    <div class="photo-card">
      <img src="001.jpg" alt="사진 1" loading="lazy" onclick="openLightbox(this.src)">
    </div>

    <div class="photo-card">
      <img src="002.jpg" alt="사진 2" loading="lazy" onclick="openLightbox(this.src)">
    </div>

    <div class="photo-card">
      <img src="003.jpg" alt="사진 3" loading="lazy" onclick="openLightbox(this.src)">
    </div>
  </main>

  <div class="share-section">
    <button type="button" class="kakao-share-btn" onclick="shareKakao()">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 3C6.48 3 2 6.58 2 11c0 2.86 1.86 5.37 4.66 6.8-.2.72-.73 2.63-.84 3.04-.13.5.18.5.38.36.16-.11 2.52-1.71 3.55-2.41.72.1 1.47.16 2.25.16 5.52 0 10-3.58 10-8s-4.48-8-10-8z" fill="#222"/>
      </svg>
      카카오톡 공유하기
    </button>
  </div>

  <footer>
    사진을 탭하면 확대해서 볼 수 있습니다 (두 손가락으로 핀치 줌 가능)
  </footer>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <div class="lightbox-close" onclick="event.stopPropagation(); closeLightbox();">&times;</div>
    <img id="lightbox-img" src="" alt="확대 이미지" onclick="event.stopPropagation();">
  </div>

  <!-- 카카오 JavaScript SDK -->
  <script src="https://developers.kakao.com/sdk/js/kakao.min.js"></script>
  <script>
    Kakao.init('ebd4f57b935cdf013239e90414e378aa');

    function shareKakao() {
      const pageUrl = location.href;
      const imageUrl = new URL('001.jpg', location.href).href;

      Kakao.Share.sendDefault({
        objectType: 'feed',
        content: {
          title: '2026 무궁화 품종 전시회 개최',
          description: '안동무궁화연구소 · 150여 종의 다양한 무궁화를 만나보세요',
          imageUrl: imageUrl,
          link: {
            mobileWebUrl: pageUrl,
            webUrl: pageUrl
          }
        },
        buttons: [
          {
            title: '자세히 보기',
            link: {
              mobileWebUrl: pageUrl,
              webUrl: pageUrl
            }
          }
        ]
      });
    }
  </script>

  <script>
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightbox-img');

    let scale = 1, panX = 0, panY = 0;
    let lastDist = 0;
    let isPanning = false;
    let startX = 0, startY = 0, startPanX = 0, startPanY = 0;
    let lastTap = 0;

    function updateTransform() {
      lbImg.style.transform = 'translate(' + panX + 'px, ' + panY + 'px) scale(' + scale + ')';
    }

    function resetTransform() {
      scale = 1;
      panX = 0;
      panY = 0;
      updateTransform();
    }

    function getDistance(t1, t2) {
      return Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
    }

    function openLightbox(src) {
      lbImg.src = src;
      resetTransform();
      lightbox.classList.add('active');
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      resetTransform();
    }

    lbImg.addEventListener('touchstart', function (e) {
      if (e.touches.length === 2) {
        lastDist = getDistance(e.touches[0], e.touches[1]);
      } else if (e.touches.length === 1) {
        isPanning = true;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        startPanX = panX;
        startPanY = panY;
      }
    }, { passive: true });

    lbImg.addEventListener('touchmove', function (e) {
      e.preventDefault();
      if (e.touches.length === 2) {
        const dist = getDistance(e.touches[0], e.touches[1]);
        if (lastDist > 0) {
          const delta = dist / lastDist;
          scale = Math.min(Math.max(scale * delta, 1), 4);
        }
        lastDist = dist;
        updateTransform();
      } else if (e.touches.length === 1 && isPanning && scale > 1) {
        panX = startPanX + (e.touches[0].clientX - startX);
        panY = startPanY + (e.touches[0].clientY - startY);
        updateTransform();
      }
    }, { passive: false });

    lbImg.addEventListener('touchend', function (e) {
      if (e.touches.length < 2) lastDist = 0;
      if (e.touches.length === 0) {
        isPanning = false;
        if (scale <= 1) resetTransform();

        const now = Date.now();
        if (now - lastTap < 300) {
          resetTransform();
        }
        lastTap = now;
      }
    });
  </script>

</body>
</html>
